<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domino Master 6.9.2 - Export Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --text: #fff; --gray: #8e8e93; --warning: #ff9f0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; font-size: 16px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #333; width: 100%; }
        button { border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; background: #2c2c2e; padding: 4px; border-radius: 12px; margin-bottom: 20px; overflow-x: auto; gap: 4px; }
        .btn-tab { flex: 1; min-width: 70px; padding: 12px 5px; background: transparent; color: var(--gray); font-size: 10px; border: none; text-transform: uppercase; }
        .btn-tab.active { background: #636366; color: #fff; border-radius: 10px; }
        input, select { font-size: 16px; background: #2c2c2e; color: #fff; border: 1px solid #3d3d41; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; appearance: none; }
        .txt-pos { color: var(--success) !important; font-weight: bold; }
        .txt-neg { color: var(--danger) !important; font-weight: bold; }
        .history-card { background: #262629; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        .hist-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #2c2c2e; }
        .hist-content { display: none; padding: 10px; background: #1c1c1e; }
        .hist-content.active { display: block; }
        .hist-item { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; display: flex; flex-direction: column; gap: 4px; }
        .player-item { display: flex; align-items: center; gap: 12px; background: #262629; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; width: 100%; }
        .select-wrapper { position: relative; width: 100%; }
        .player-select { padding-left: 45px !important; }
        .select-avatar-preview { position: absolute; left: 10px; top: 50%; transform: translateY(-75%); width: 28px; height: 28px; border-radius: 50%; border: 1px solid #555; object-fit: cover; display: none; pointer-events: none; z-index: 10; }
        .game-player-imgs { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .game-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555; object-fit: cover; }
        .score-display { font-size: 3.2rem; font-weight: 900; color: var(--success); margin: 2px 0; }
        .input-score-big { font-size: 32px !important; height: 60px; text-align: center; font-weight: bold; color: var(--primary) !important; border: 2px solid #444 !important; margin-bottom: 5px !important; }
        .btn-add-big { flex: 2; height: 50px; font-size: 24px; background: var(--primary); color: #fff; border-radius: 10px; }
        .btn-empate { flex: 1; height: 50px; font-size: 11px; background: var(--warning); color: #000; margin-left: 5px; border-radius: 10px; font-weight: 900; }
        .btn-undo { width: 100%; height: 35px; font-size: 12px; background: #444; color: #fff; margin-top: 5px; border-radius: 8px; opacity: 0.8; }
        .points-list { background: #161617; border-radius: 8px; border: 1px solid #333; font-size: 13px; height: 100px; overflow-y: auto; margin-top: 10px; }
        .points-entry { padding: 4px; border-bottom: 1px solid #222; text-align: center; color: var(--gray); }
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        .photo-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
        #edit-img-preview { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .descanso-badge { background: #3a3a3c; color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 12px; display: inline-flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; border: 1px solid #444; width: 100%; }
        .rest-player-item { display: flex; align-items: center; gap: 5px; background: #2c2c2e; padding: 4px 8px; border-radius: 8px; }
        .rest-img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #555; object-fit: cover; }
        .export-section { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        .btn-export { background: #3a3a3c; color: #fff; padding: 12px; width: 100%; font-size: 14px; }
        label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 4px; margin-left: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-setup">
        <h1 style="text-align:center; font-size: 22px;">Domino Master 6.9.2</h1>
        <div class="card">
            <div class="tabs">
                <button class="btn-tab active" onclick="showTab('play')">🎮 JUGAR</button>
                <button class="btn-tab" onclick="showTab('rank')">🏆 RANK</button>
                <button class="btn-tab" onclick="showTab('stats')">📊 STATS</button>
                <button class="btn-tab" onclick="showTab('hist')">📜 HIST</button>
                <button class="btn-tab" onclick="showTab('edit')">👥 JUGS</button>
                <button class="btn-tab" onclick="showTab('sett')">⚙️</button>
            </div>
            
            <div id="view-play" class="tab-content">
                <select id="round-type" onchange="createSelectors()">
                    <option value="4">Ronda de 4 (3 Juegos)</option>
                    <option value="5">Ronda de 5 (5 Juegos)</option>
                    <option value="6" selected>Ronda de 6 (Triangular)</option>
                </select>
                <div id="selector-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
                <button onclick="beginRonda()" style="background:var(--success); color:#fff; width:100%; padding:20px; border-radius:12px; margin-top:20px; font-size:20px">INICIAR PARTIDA</button>
            </div>

            <div id="view-rank" class="tab-content" style="display:none"><table style="width:100%"><tbody id="rank-body"></tbody></table></div>
            <div id="view-stats" class="tab-content" style="display:none"><div class="card"><canvas id="chartRayas"></canvas></div><div id="stats-summary"></div></div>
            <div id="view-hist" class="tab-content" style="display:none"><div id="history-list"></div></div>
            <div id="view-edit" class="tab-content" style="display:none"><div id="player-list"></div><button onclick="openEditor()" style="background:var(--primary); color:#fff; width:100%; padding:15px; border-radius:10px; font-size:16px; margin-top:10px">+ Nuevo Jugador</button></div>
            
            <div id="view-sett" class="tab-content" style="display:none">
                <div class="export-section">
                    <p style="font-size: 12px; color: var(--gray); text-align: center; margin-bottom: 5px;">EXPORTAR DATOS (.CSV)</p>
                    <button class="btn-export" onclick="exportRankingCSV()">📥 Exportar Ranking</button>
                    <button class="btn-export" onclick="exportHistoryCSV()">📥 Exportar Histórico</button>
                </div>
                <div style="margin-top: 30px;">
                    <button onclick="resetData()" style="width:100%; padding:15px; background:none; color:var(--danger); border:1px solid var(--danger); border-radius:10px;">🗑️ BORRAR TODO</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-game" style="display:none">
        <div class="card" style="padding:10px; text-align: center;">
            <div id="game-header" style="font-size:13px; color:var(--warning); font-weight:bold; margin-bottom:5px;"></div>
            <div id="descanso-info"></div>
            <div style="display:flex; gap:8px;">
                <div style="flex:1; background:#262629; padding:10px; border-radius:12px; border:1px solid #444">
                    <div id="game-imgs-a" class="game-player-imgs"></div>
                    <div id="names-a" style="font-size:10px; font-weight:bold; height:25px;"></div>
                    <div class="score-display" id="score-a">0</div>
                    <input type="number" id="pts-a" class="input-score-big" placeholder="0" inputmode="numeric">
                    <div style="display:flex"><button onclick="sumPts('A')" class="btn-add-big">+</button><button onclick="sumEmpate('A')" class="btn-empate">EMPATE</button></div>
                    <div id="list-a" class="points-list"></div>
                    <button onclick="undo('A')" class="btn-undo">DESHACER</button>
                </div>
                <div style="flex:1; background:#262629; padding:10px; border-radius:12px; border:1px solid #444">
                    <div id="game-imgs-b" class="game-player-imgs"></div>
                    <div id="names-b" style="font-size:10px; font-weight:bold; height:25px;"></div>
                    <div class="score-display" id="score-b">0</div>
                    <input type="number" id="pts-b" class="input-score-big" placeholder="0" inputmode="numeric">
                    <div style="display:flex"><button onclick="sumPts('B')" class="btn-add-big">+</button><button onclick="sumEmpate('B')" class="btn-empate">EMPATE</button></div>
                    <div id="list-b" class="points-list"></div>
                    <button onclick="undo('B')" class="btn-undo">DESHACER</button>
                </div>
            </div>
            <button id="btn-next" onclick="stepForward()" style="width:100%; padding:20px; margin-top:15px; background:var(--success); color:#fff; display:none; border-radius:12px; font-size:18px">REGISTRAR JUEGO</button>
            <button onclick="abandonarRonda()" style="width:100%; margin-top:15px; color:var(--danger); background:none; font-size:12px">ABANDONAR Y GUARDAR</button>
        </div>
    </div>
</div>

<div id="editor-overlay">
    <div class="container">
        <div class="card" style="margin-top: 20px;">
            <h3 style="text-align:center">Perfil Jugador</h3>
            <div class="photo-container" onclick="document.getElementById('file-input').click()">
                <img id="edit-img-preview" src="">
                <div style="position:absolute; bottom:0; right:0; background:var(--primary); padding:5px; border-radius:50%; color:white; font-size:12px">📷</div>
            </div>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <label>Nombre</label><input type="text" id="edit-name">
            <label>Email</label><input type="email" id="edit-email" placeholder="correo@ejemplo.com">
            <label>WhatsApp / Teléfono</label><input type="tel" id="edit-phone" placeholder="+00 000 000 000">
            <label>Fecha de Nacimiento</label><input type="date" id="edit-bday">
            <div style="display:flex; gap:10px; margin-top:15px">
                <button onclick="closeEditor()" style="flex:1; background:#444; color:#fff; padding:15px">Cancelar</button>
                <button onclick="savePlayer()" style="flex:2; background:var(--success); color:#fff; padding:15px">Guardar</button>
            </div>
            <button id="btn-delete-player" onclick="deletePlayer()" style="background:none; color:var(--danger); border:1px solid var(--danger); padding:12px; margin-top:10px; display:none; width:100%">Eliminar Jugador</button>
        </div>
    </div>
</div>

<script>
    const K_P = 'dm661_players', K_DB = 'dm661_db';
    let players = JSON.parse(localStorage.getItem(K_P)) || [];
    let db = JSON.parse(localStorage.getItem(K_DB)) || [];
    let active = {}, scoresA = [], scoresB = [], editingId = null, myChart = null;

    if(!players.length) { 
        for(let i=1; i<=6; i++) players.push({id: i, name: `Jugador ${i}`, img: `https://api.dicebear.com/7.x/avataaars/svg?seed=P${i}`, email: "", phone: "", bday: ""}); 
    }

    function downloadCSV(csv, filename) {
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }

    function exportRankingCSV() {
        const s = {}; players.forEach(p => s[p.name] = {r:0});
        db.forEach(r => r.jugadores.forEach(j => { if(s[j.n]) s[j.n].r += j.r; }));
        let csv = "Jugador,Rayas Totales\n";
        Object.keys(s).sort((a,b)=>s[b].r - s[a].r).forEach(n => { csv += `${n},${s[n].r}\n`; });
        downloadCSV(csv, `ranking_domino_${new Date().toLocaleDateString()}.csv`);
    }

    function exportHistoryCSV() {
        // Se agregan las columnas de Rayas a Favor y Rayas en Contra
        let csv = "Fecha,Tipo Ronda,Juego,Ganadores,Perdedores,Rayas a Favor,Rayas en Contra,Pts Ganador,Pts Perdedor\n";
        db.forEach(r => {
            r.log.forEach(l => {
                // Rayas a favor (positivas) y en contra (negativas)
                csv += `"${r.fecha}",Ronda ${r.tipo},${l.j},"${l.gan.join(' & ')}","${l.per.join(' & ')}",${l.r},-${l.r},${l.ptsW},${l.ptsL}\n`;
            });
        });
        downloadCSV(csv, `historial_domino_${new Date().toLocaleDateString()}.csv`);
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById('view-' + t).style.display = 'block';
        document.querySelectorAll('.btn-tab').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(t)));
        if(t === 'stats') renderStats();
        render();
    }

    function createSelectors() {
        const n = parseInt(document.getElementById('round-type').value);
        const area = document.getElementById('selector-grid'); area.innerHTML = '';
        for(let i=0; i<n; i++) area.innerHTML += `<div class="select-wrapper"><img id="sel-avatar-${i}" class="select-avatar-preview" src=""><select id="sel-${i}" class="player-select" onchange="updateOptions()"></select></div>`;
        updateOptions();
    }

    function updateOptions() {
        const n = parseInt(document.getElementById('round-type').value);
        const selNames = Array.from({length:n}, (_,i) => document.getElementById('sel-'+i).value);
        for(let i=0; i<n; i++) {
            const sel = document.getElementById('sel-'+i), av = document.getElementById('sel-avatar-'+i), curr = selNames[i];
            const pFound = players.find(x => x.name === curr);
            if(pFound) { av.src = pFound.img; av.style.display = "block"; } else av.style.display = "none";
            let h = `<option value="">-- J${i+1} --</option>`;
            players.forEach(p => { if(!selNames.some((v, idx) => v === p.name && idx !== i)) h += `<option value="${p.name}" ${curr === p.name ? 'selected' : ''}>${p.name}</option>`; });
            sel.innerHTML = h;
        }
    }

    // FUNCION PARA GENERAR PAREJAS ALEATORIAS SIN REPETIR
    function getUniquePairs() {
        let intentos = 0;
        while(intentos < 1000) {
            let p = [0, 1, 2, 3, 4, 5].sort(() => Math.random() - 0.5);
            let p1 = [p[0], p[1]].sort((a,b)=>a-b);
            let p2 = [p[2], p[3]].sort((a,b)=>a-b);
            let p3 = [p[4], p[5]].sort((a,b)=>a-b);

            let c1 = p1.join('-');
            let c2 = p2.join('-');
            let c3 = p3.join('-');

            if(!active.usedPairs.includes(c1) && !active.usedPairs.includes(c2) && !active.usedPairs.includes(c3)) {
                active.usedPairs.push(c1, c2, c3);
                return { p1, p2, p3 };
            }
            intentos++;
        }
        return null; // Si se acaban todas las combinaciones posibles
    }

    function beginRonda() {
        const n = parseInt(document.getElementById('round-type').value);
        const names = Array.from({length:n}, (_,i) => document.getElementById('sel-'+i).value);
        if(names.includes("")) return alert("Selecciona todos los jugadores");
        active = { tipo: n, fecha: new Date().toLocaleString(), jugadores: names.map(n => ({n, r:0, j:0})), juegoNum: 1, log: [] };
        
        // Inicialización estricta para la Ronda de 6
        if(n == 6) {
            active.numRonda = 1;
            active.usedPairs = [];
            // Parejas fijas 1 y 2, 3 y 4, 5 y 6
            active.p1 = [0, 1];
            active.p2 = [2, 3];
            active.p3 = [4, 5];
            active.usedPairs.push("0-1", "2-3", "4-5");
        }

        prepareStarter();
    }

    function prepareStarter() {
        let pA, pB, rest = [];
        const n = active.tipo, j = active.juegoNum;
        
        if(n == 4) { 
            const c = [[0,1,2,3],[0,2,1,3],[0,3,1,2]][j-1]; pA=[c[0],c[1]]; pB=[c[2],c[3]]; 
        }
        else if(n == 5) { 
            const c = [[0,1,2,3,4],[0,2,3,4,1],[0,3,4,1,2],[0,4,1,2,3],[2,4,1,3,0]][j-1]; pA=[c[0],c[1]]; pB=[c[2],c[3]]; rest=[c[4]]; 
        }
        else { 
            // LÓGICA DE ENFRENTAMIENTOS RONDA DE 6
            if(j == 1) { 
                pA = active.p1; pB = active.p2; rest = active.p3; 
            }
            else if(j == 2) { 
                pA = active.lastWinner; pB = active.p3; rest = active.lastLoser; 
            }
            else { 
                pA = active.lastLoser; pB = active.p3; rest = active.lastWinner; 
            } 
        }
        
        active.currentMatch = { a: pA, b: pB, resting: rest };
        const dDiv = document.getElementById('descanso-info');
        if(rest.length > 0) {
            let html = `<div class="descanso-badge"><span>Descansa:</span>`;
            rest.forEach(i => {
                const name = active.jugadores[i].n;
                const p = players.find(x => x.name === name);
                html += `<div class="rest-player-item"><img src="${p.img}" class="rest-img"> <span>${name}</span></div>`;
            });
            dDiv.innerHTML = html + `</div>`;
        } else dDiv.innerHTML = "";
        
        loadMatch();
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
    }

    function loadMatch() {
        scoresA = []; scoresB = []; recalc('A'); recalc('B');
        document.getElementById('btn-next').style.display = 'none';
        const draw = (inds) => inds.map(i => {
            const p = players.find(x => x.name === active.jugadores[i].n);
            return `<img src="${p.img}" class="game-avatar">`;
        }).join('');
        document.getElementById('game-imgs-a').innerHTML = draw(active.currentMatch.a);
        document.getElementById('game-imgs-b').innerHTML = draw(active.currentMatch.b);
        document.getElementById('names-a').innerText = active.currentMatch.a.map(i=>active.jugadores[i].n).join(" & ");
        document.getElementById('names-b').innerText = active.currentMatch.b.map(i=>active.jugadores[i].n).join(" & ");
        
        if(active.tipo == 6) {
            document.getElementById('game-header').innerText = `Ronda ${active.numRonda} - Juego ${active.juegoNum}`;
        } else {
            document.getElementById('game-header').innerText = `Juego ${active.juegoNum} (Ronda de ${active.tipo})`;
        }
    }

    function sumPts(t) {
        const inp = document.getElementById('pts-'+t.toLowerCase());
        const v = parseInt(inp.value) || 0;
        if(t==='A') scoresA.push(v); else scoresB.push(v);
        recalc(t); inp.value = "";
    }
    function sumEmpate(t) { if(t==='A') scoresA.push(0); else scoresB.push(0); recalc(t); }
    function undo(t) { if(t==='A') scoresA.pop(); else scoresB.pop(); recalc(t); }

    function recalc(t) {
        const list = (t==='A' ? scoresA : scoresB);
        const total = list.reduce((a,b)=>a+b, 0);
        document.getElementById('score-'+t.toLowerCase()).innerText = total;
        let running = 0;
        document.getElementById('list-'+t.toLowerCase()).innerHTML = list.map(v => {
            running += v; return `<div class="points-entry">+${v} (${running})</div>`;
        }).reverse().join('');
        const totalA = scoresA.reduce((a,b)=>a+b,0);
        const totalB = scoresB.reduce((a,b)=>a+b,0);
        document.getElementById('btn-next').style.display = (totalA >= 100 || totalB >= 100) ? 'block' : 'none';
    }

    function stepForward() {
        const totalA = scoresA.reduce((a,b)=>a+b,0);
        const totalB = scoresB.reduce((a,b)=>a+b,0);
        const winA = totalA > totalB;
        const ptsW = winA ? totalA : totalB;
        const ptsL = winA ? totalB : totalA;
        const r = ptsL <= 0 ? 3 : (ptsL < 51 ? 2 : 1);
        const wIdx = winA ? active.currentMatch.a : active.currentMatch.b;
        const lIdx = winA ? active.currentMatch.b : active.currentMatch.a;
        
        wIdx.forEach(i => { active.jugadores[i].r += r; active.jugadores[i].j++; });
        lIdx.forEach(i => { active.jugadores[i].r -= r; active.jugadores[i].j++; });
        
        active.log.push({ j: active.juegoNum, gan: wIdx.map(i=>active.jugadores[i].n), per: lIdx.map(i=>active.jugadores[i].n), r, ptsW, ptsL, numRonda: active.numRonda });
        
        // Guardar ganador y perdedor del juego 1 para rotar a la Pareja 3
        if(active.juegoNum === 1) {
            active.lastWinner = wIdx;
            active.lastLoser = lIdx;
        }

        active.juegoNum++;
        
        let limitJuegos = (active.tipo == 5 ? 5 : 3);

        if(active.juegoNum <= limitJuegos) {
            prepareStarter();
        } else {
            // Al terminar el triangular
            if(active.tipo == 6) {
                if(confirm("¿Desea continuar con otra ronda cambiando de parejas aleatoriamente sin repetir?")) {
                    let nuevas = getUniquePairs();
                    if(nuevas) {
                        active.p1 = nuevas.p1;
                        active.p2 = nuevas.p2;
                        active.p3 = nuevas.p3;
                        active.numRonda++;
                        active.juegoNum = 1;
                        prepareStarter();
                    } else {
                        alert("Se han jugado todas las combinaciones de parejas posibles. Fin de la partida.");
                        finishRonda(true);
                    }
                } else {
                    finishRonda(true);
                }
            } else {
                finishRonda(true);
            }
        }
    }

    function abandonarRonda() {
        if(confirm("¿Seguro que deseas abandonar la partida? Se guardarán los juegos que ya hayas completado en el historial.")) {
            // Solo guarda si se jugó al menos un partido en esta sesión
            finishRonda(active.log && active.log.length > 0);
        }
    }

    function finishRonda(save) {
        if(save) db.push(active);
        document.getElementById('screen-game').style.display = 'none';
        document.getElementById('screen-setup').style.display = 'block';
        render();
    }

    function render() {
        localStorage.setItem(K_P, JSON.stringify(players));
        localStorage.setItem(K_DB, JSON.stringify(db));
        const s = {}; players.forEach(p => s[p.name] = {r:0, img:p.img});
        db.forEach(r => r.jugadores.forEach(j => { if(s[j.n]) s[j.n].r += j.r; }));
        
        document.getElementById('rank-body').innerHTML = Object.keys(s).sort((a,b)=>s[b].r - s[a].r).map(n => 
            `<tr style="border-bottom:1px solid #333"><td style="padding:10px"><img src="${s[n].img}" style="width:35px;height:35px;border-radius:50%"></td><td>${n}</td><td style="text-align:right" class="${s[n].r>=0?'txt-pos':'txt-neg'}">${s[n].r}R</td></tr>`
        ).join('');
        
        document.getElementById('history-list').innerHTML = db.slice().reverse().map(r => `
            <div class="history-card">
                <div class="hist-header" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span><b>Ronda ${r.tipo}</b> <small>${r.fecha}</small></span><span>▼</span>
                </div>
                <div class="hist-content">
                    ${r.log.map(l => `
                        <div class="hist-item">
                            ${l.numRonda ? `<div style="font-size:11px; color:var(--primary); margin-bottom:2px">Ronda ${l.numRonda} - Juego ${l.j}</div>` : ''}
                            <div style="display:flex; justify-content:space-between"><span><b>G:</b> ${l.gan.join(" & ")}</span><span class="txt-pos">+${l.r}R (${l.ptsW})</span></div>
                            <div style="display:flex; justify-content:space-between"><span style="color:var(--gray)"><b>P:</b> ${l.per.join(" & ")}</span><span class="txt-neg">-${l.r}R (${l.ptsL})</span></div>
                        </div>`).join('')}
                </div>
            </div>`).join('');
            
        document.getElementById('player-list').innerHTML = players.map(p => `
            <div class="player-item" onclick="openEditor(${p.id})">
                <img src="${p.img}" style="width:40px;height:40px;border-radius:50%;object-fit:cover"><b>${p.name}</b>
            </div>`).join('');
    }

    function renderStats() {
        const s = {}; players.forEach(p => s[p.name] = {r:0, j:0});
        db.forEach(r => r.jugadores.forEach(j => { if(s[j.n]) { s[j.n].r += j.r; s[j.n].j += 1; } }));
        const sorted = Object.entries(s).sort((a,b)=>b[1].r - a[1].r);
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chartRayas').getContext('2d'), { 
            type:'bar', data: { labels: sorted.map(x=>x[0]), datasets:[{label:'Rayas', data:sorted.map(x=>x[1].r), backgroundColor:'#0a84ff'}] } 
        });
        document.getElementById('stats-summary').innerHTML = sorted.map(x => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333"><b>${x[0]}</b> <span>${x[1].r}R en ${x[1].j} rondas</span></div>`).join('');
    }

    function openEditor(id=null) {
        editingId = id;
        const p = id ? players.find(x=>x.id===id) : {name:"", img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Date.now()}`, email: "", phone: "", bday: ""};
        document.getElementById('edit-name').value = p.name;
        document.getElementById('edit-email').value = p.email || "";
        document.getElementById('edit-phone').value = p.phone || "";
        document.getElementById('edit-bday').value = p.bday || "";
        document.getElementById('edit-img-preview').src = p.img;
        document.getElementById('btn-delete-player').style.display = id ? 'block' : 'none';
        document.getElementById('editor-overlay').style.display = 'block';
    }

    function savePlayer() {
        const n = document.getElementById('edit-name').value.trim();
        if(!n) return alert("Nombre requerido");
        
        const data = {
            name: n,
            email: document.getElementById('edit-email').value,
            phone: document.getElementById('edit-phone').value,
            bday: document.getElementById('edit-bday').value,
            img: document.getElementById('edit-img-preview').src
        };

        if(editingId) {
            const idx = players.findIndex(x=>x.id===editingId);
            players[idx] = { ...players[idx], ...data };
        } else {
            players.push({ id: Date.now(), ...data });
        }
        closeEditor(); render(); updateOptions();
    }

    function deletePlayer() { if(confirm("¿Eliminar?")) { players = players.filter(x => x.id !== editingId); closeEditor(); render(); updateOptions(); } }
    function closeEditor() { document.getElementById('editor-overlay').style.display='none'; }
    document.getElementById('file-input').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById('edit-img-preview').src = ev.target.result;
        reader.readAsDataURL(e.target.files[0]);
    };
    function resetData() { if(confirm("¿Borrar todo?")) { db=[]; localStorage.removeItem(K_DB); render(); } }

    createSelectors(); render();
</script>
</body>
</html>
